id: "SOC2"
name: "SOC 2 Type II"
version: "2022"
description: "AICPA Trust Services Criteria for SOC 2 (Security, Availability, Confidentiality, Processing Integrity, Privacy)"
controls:
  - id: "CC1.1"
    name: "Demonstrates Commitment to Integrity and Ethical Values"
    description: "The entity demonstrates a commitment to integrity and ethical values."
    category: "Control Environment"
    rule_ids:
      - "dlp_credit_card_in_log"
      - "dlp_ssn_in_log"
      - "dlp_private_key_in_log"

  - id: "CC2.1"
    name: "Internal Communication of Objectives"
    description: "The entity internally communicates information, including objectives and responsibilities."
    category: "Communication and Information"
    rule_ids: []

  - id: "CC3.2"
    name: "Risk Assessment Process"
    description: "The entity identifies risks across the entity and analyzes risks as a basis for determining how the risks should be managed."
    category: "Risk Assessment"
    rule_ids:
      - "ids_suricata_alert_high"
      - "sigma_win_zerologon"
      - "sigma_win_printnightmare"

  - id: "CC5.1"
    name: "Control Selection to Mitigate Risk"
    description: "The entity selects and develops control activities that contribute to the mitigation of risks."
    category: "Control Activities"
    rule_ids:
      - "crit_ssh_brute_force"
      - "failed_login_threshold"
      - "win_failed_logon_4625_bruteforce_threshold"
      - "brute_force_linux_ssh_threshold"

  - id: "CC6.1"
    name: "Logical Access Security Software"
    description: "The entity implements logical access security software, infrastructure, and architectures."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "win_special_privileges_4672"
      - "warn_sudo_abuse"
      - "privilege_escalation"
      - "crit_root_login"
      - "win_group_member_added_4728_4732_4756"
      - "windows_admin_group_member_added"
      - "linux_sudo_auth_failure"
      - "linux_sudo_failures"

  - id: "CC6.2"
    name: "User Registration and Authorization"
    description: "Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "win_new_user_4720"
      - "win_user_created_4720"
      - "win_user_deleted_4726"
      - "new_user_created"
      - "linux_new_user_created"
      - "linux_useradd_userdel"

  - id: "CC6.3"
    name: "Role-Based Access Control"
    description: "The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets based on roles."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "win_sequence_new_user_then_priv_group_4720_4728_4732"
      - "sigma_aws_new_global_admin"
      - "sigma_azure_new_global_admin"
      - "sigma_okta_admin_role_assigned"

  - id: "CC6.6"
    name: "Logical Access from Outside the Boundaries"
    description: "Logical access to information assets covered by the scope of the engagement is restricted to authorized users."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "net_inbound_rdp"
      - "sigma_net_rdp_to_external"
      - "sigma_net_ssh_to_external_rare"
      - "sigma_aws_root_login"
      - "linux_ssh_bruteforce"
      - "linux_ssh_failed_password_threshold"

  - id: "CC6.7"
    name: "Transmission/Movement of Information"
    description: "The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "exfil_archive_then_upload"
      - "exfil_dns_tunneling"
      - "exfil_cloud_storage_upload"
      - "exfil_large_outbound_transfer"
      - "network_large_egress_threshold"
      - "dlp_credit_card_in_log"
      - "dlp_ssn_in_log"

  - id: "CC6.8"
    name: "Unauthorized/Malicious Software Protection"
    description: "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software."
    category: "Logical and Physical Access Controls"
    rule_ids:
      - "windows_defender_malware"
      - "defense_disable_defender"
      - "tags_malware_indicator"
      - "ransomware_mass_modifications_low"
      - "ransomware_known_extensions"
      - "sigma_win_proc_hollowing"
      - "sigma_win_dll_side_loading"
      - "sigma_linux_crypto_miner_process"

  - id: "CC7.1"
    name: "System and Infrastructure Detection"
    description: "To meet its objectives, the entity uses detection and monitoring procedures."
    category: "System Operations"
    rule_ids:
      - "ids_suricata_alert_high"
      - "fim_sensitive_path_change"
      - "recon_port_scan_detected"
      - "suspicious_network_scan"
      - "honeypot_cowrie_login_failed"
      - "trap_tcp_port_hit"
      - "trap_scanner_detected"

  - id: "CC7.2"
    name: "Monitoring Effectiveness of Controls"
    description: "The entity monitors system components and the operation of those controls on an ongoing basis."
    category: "System Operations"
    rule_ids:
      - "agent_heartbeat_missed"
      - "agent_certificate_expiring"
      - "storage_utilization_critical"
      - "memory_utilization_critical"
      - "cpu_utilization_sustained"

  - id: "CC7.3"
    name: "Evaluation of Security Events"
    description: "The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives."
    category: "System Operations"
    rule_ids:
      - "seq_brute_force_then_login_success"
      - "seq_defender_disabled_then_malware"
      - "seq_suspicious_process_then_c2"
      - "seq_cred_dump_then_lateral"
      - "seq_privesc_then_persistence"
      - "win_sequence_credential_to_priv_to_log_clear_4625_4672_1102"

  - id: "CC7.4"
    name: "Incident Response"
    description: "The entity responds to identified security incidents by executing a defined incident management process."
    category: "System Operations"
    rule_ids:
      - "lateral_movement_psexec_indicators"
      - "sigma_win_impacket_tools"
      - "sigma_win_golden_ticket"
      - "sigma_win_dcsync"
      - "seq_firewall_disabled_then_exfil"
      - "seq_rdp_login_then_lateral"
      - "seq_multiple_host_login_lateral"

  - id: "CC7.5"
    name: "Identification and Recovery"
    description: "The entity identifies, develops, and implements activities to recover from identified security events."
    category: "System Operations"
    rule_ids:
      - "defense_evasion_vssadmin_delete"
      - "defense_vssadmin_delete_shadows"
      - "defense_evasion_bcdedit_recovery_disable"

  - id: "CC8.1"
    name: "Authorized Changes"
    description: "The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure."
    category: "Change Management"
    rule_ids:
      - "win_schtask_created_4698"
      - "win_schtasks_create_4698"
      - "persistence_schtasks_cmd"
      - "windows_scheduled_task_suspicious"
      - "lolbin_schtasks_create"
      - "sigma_win_schtask_system"

  - id: "CC9.1"
    name: "Risk Mitigation"
    description: "The entity identifies, selects, and develops risk mitigation activities for risks arising from business disruption."
    category: "Risk Mitigation"
    rule_ids:
      - "storage_utilization_critical"
      - "memory_utilization_critical"
      - "cpu_utilization_sustained"
