id: "ISO-27001"
name: "ISO/IEC 27001:2022"
version: "2022"
description: "ISO/IEC 27001:2022 Information Security Management System"
controls:
  - id: "A.5.15"
    name: "Access Control"
    description: "Rules to control physical and logical access to information and other associated assets."
    category: "Access Control"
    rule_ids:
      - "crit_root_login"
      - "warn_sudo_abuse"
      - "privilege_escalation"
      - "win_special_privileges_4672"
      - "win_group_member_added_4728_4732_4732"
      - "windows_admin_group_member_added"
      - "linux_sudo_auth_failure"
      - "linux_sudo_failures"

  - id: "A.5.16"
    name: "Identity Management"
    description: "Full lifecycle of identities managed."
    category: "Access Control"
    rule_ids:
      - "win_new_user_4720"
      - "win_user_created_4720"
      - "win_user_deleted_4726"
      - "win_user_enabled_4722"
      - "win_user_disabled_4725"
      - "new_user_created"
      - "linux_new_user_created"
      - "linux_useradd_userdel"
      - "win_new_user_4720"
      - "win_sequence_new_user_then_enabled_4720_4722"

  - id: "A.5.17"
    name: "Authentication Information"
    description: "Allocation and management of authentication information."
    category: "Access Control"
    rule_ids:
      - "win_password_reset_4724"
      - "win_password_change_4723"
      - "file_authorized_keys_modified"
      - "sigma_linux_ssh_authorized_keys_backdoor"

  - id: "A.8.2"
    name: "Privileged Access Rights"
    description: "Allocation and use of privileged access rights is restricted and managed."
    category: "Access Control"
    rule_ids:
      - "win_sequence_new_user_then_priv_group_4720_4728_4732"
      - "win_sequence_credential_to_priv_to_persistence_4625_4672_4698"
      - "sigma_win_pass_the_hash"
      - "sigma_win_golden_ticket"
      - "sigma_win_dcsync"
      - "seq_privesc_then_persistence"

  - id: "A.8.5"
    name: "Secure Authentication"
    description: "Secure authentication technologies and procedures."
    category: "Access Control"
    rule_ids:
      - "crit_ssh_brute_force"
      - "failed_login_threshold"
      - "win_failed_logon_4625_bruteforce_threshold"
      - "win_failed_logon_4625_password_spray_threshold"
      - "win_account_lockout_4740"
      - "win_kerberos_preauth_fail_4771_threshold"
      - "win_ntlm_auth_fail_4776_threshold"
      - "brute_force_linux_ssh_threshold"
      - "linux_ssh_failed_password_threshold"
      - "linux_ssh_bruteforce"

  - id: "A.8.7"
    name: "Protection Against Malware"
    description: "Protection against malware is implemented and supported."
    category: "Threat Intelligence"
    rule_ids:
      - "windows_defender_malware"
      - "defense_disable_defender"
      - "tags_malware_indicator"
      - "ransomware_mass_modifications_low"
      - "ransomware_known_extensions"
      - "mass_file_encryption"
      - "sigma_win_proc_hollowing"
      - "sigma_linux_crypto_miner_process"
      - "sigma_win_lsass_access"

  - id: "A.8.8"
    name: "Management of Technical Vulnerabilities"
    description: "Information about technical vulnerabilities is managed."
    category: "Vulnerability Management"
    rule_ids:
      - "sigma_win_printnightmare"
      - "sigma_win_zerologon"
      - "sigma_win_wmi_persistence"
      - "sigma_linux_container_escape"
      - "sigma_linux_kernel_module_load"

  - id: "A.8.9"
    name: "Configuration Management"
    description: "Configurations, including security configurations, of hardware, software and services are established."
    category: "Physical/Environmental"
    rule_ids:
      - "tool_netsh_firewall_changes"
      - "defense_disable_firewall"
      - "registry_runkeys_modified"
      - "registry_winlogon_shell_userinit"
      - "registry_services_imagepath"
      - "registry_ifeo_debugger"
      - "tool_reg_add_runkey"
      - "sigma_win_wmi_persistence"

  - id: "A.8.12"
    name: "Data Leakage Prevention"
    description: "Data leakage prevention measures are applied to systems, networks and other devices."
    category: "Information Security"
    rule_ids:
      - "dlp_credit_card_in_log"
      - "dlp_ssn_in_log"
      - "dlp_private_key_in_log"
      - "exfil_archive_then_upload"
      - "exfil_dns_tunneling"
      - "exfil_cloud_storage_upload"
      - "exfil_large_outbound_transfer"
      - "network_large_egress_threshold"

  - id: "A.8.15"
    name: "Logging"
    description: "Logs that record activities, exceptions, faults and other relevant events are produced, stored, protected and analysed."
    category: "Logging and Monitoring"
    rule_ids:
      - "defense_evasion_clear_event_logs"
      - "win_audit_log_cleared_1102"
      - "win_audit_policy_change_4719"
      - "defense_wevtutil_clr"
      - "win_sequence_audit_policy_then_log_cleared_4719_1102"
      - "sigma_linux_history_deletion"
      - "seq_linux_log_tampering"

  - id: "A.8.16"
    name: "Monitoring Activities"
    description: "Networks, systems and applications are monitored for anomalous behaviour."
    category: "Logging and Monitoring"
    rule_ids:
      - "ids_suricata_alert_high"
      - "recon_port_scan_detected"
      - "suspicious_network_scan"
      - "recon_active_directory_enumeration"
      - "recon_network_share_discovery"
      - "seq_brute_force_then_login_success"
      - "seq_suspicious_process_then_c2"

  - id: "A.8.20"
    name: "Network Security"
    description: "Networks and network devices are secured, managed and controlled."
    category: "Network Security"
    rule_ids:
      - "network_c2_port"
      - "network_suspicious_ports_extended"
      - "net_outbound_suspicious_ports"
      - "net_inbound_rdp"
      - "sigma_net_rdp_to_external"
      - "sigma_net_ssh_to_external_rare"
      - "sigma_net_smb_from_non_windows"
      - "network_ja3_known_suspicious"

  - id: "A.8.22"
    name: "Segregation of Networks"
    description: "Groups of information services, users and information systems are segregated in the organization's networks."
    category: "Network Security"
    rule_ids:
      - "lateral_movement_psexec_indicators"
      - "sigma_win_impacket_tools"
      - "seq_rdp_login_then_lateral"
      - "seq_multiple_host_login_lateral"
      - "seq_cred_dump_then_lateral"
      - "process_psexec_like"
      - "process_wmic_remote"

  - id: "A.8.23"
    name: "Web Filtering"
    description: "Access to external websites is managed to reduce exposure to malicious content."
    category: "Network Security"
    rule_ids:
      - "network_tls_sni_suspicious"
      - "sigma_net_dns_over_https"
      - "lolbin_bitsadmin_transfer"
      - "lolbin_mshta_remote"
      - "lolbin_certutil_urlcache"
      - "process_lolbin_curl_wget_download"
      - "sigma_linux_suspicious_download_exec"

  - id: "A.8.25"
    name: "Secure Development Lifecycle"
    description: "Rules for the secure development of software and systems are established and applied."
    category: "Supplier Relationships"
    rule_ids:
      - "sigma_suspicious_pip_install"
      - "sigma_apt_get_unusual_source"
      - "resource_dev_infrastructure_purchase"
      - "resource_dev_domain_generation"
      - "resource_dev_tool_download"

  - id: "A.8.28"
    name: "Secure Coding"
    description: "Secure coding principles are applied to software development."
    category: "Supplier Relationships"
    rule_ids:
      - "trap_shell_injection_probe"
      - "trap_api_exposure_probe"
      - "trap_env_secrets_probe"

  - id: "A.8.34"
    name: "Protection of Information Systems During Audit Testing"
    description: "Audit tests and other assurance activities involving assessment of operational systems are planned."
    category: "Information Security Audit"
    rule_ids:
      - "discovery_net_user_group"
      - "discovery_whoami_ipconfig_systeminfo"
      - "sigma_win_bloodhound"
      - "sigma_linux_history_deletion"
      - "sigma_linux_timestomp"
