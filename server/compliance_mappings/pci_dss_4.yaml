id: "PCI-DSS"
name: "PCI DSS"
version: "4.0"
description: "Payment Card Industry Data Security Standard v4.0"
controls:
  - id: "PCI-1.1"
    name: "Network Security Controls"
    description: "Processes and mechanisms for installing and maintaining NSC configurations."
    category: "Network Security"
    rule_ids:
      - "network_c2_port"
      - "net_outbound_suspicious_ports"
      - "network_suspicious_ports_extended"
      - "tool_netsh_firewall_changes"
      - "defense_disable_firewall"
      - "sigma_net_ssh_to_external_rare"
      - "sigma_net_rdp_to_external"

  - id: "PCI-2.2"
    name: "System Component Configuration"
    description: "System components are configured and managed securely."
    category: "Secure Configuration"
    rule_ids:
      - "unauthorized_service_install"
      - "win_service_installed_4697"
      - "win_scm_service_install_7045"
      - "windows_service_install_suspicious_path"
      - "persistence_sc_create_service"

  - id: "PCI-3.4"
    name: "Storage of Account Data"
    description: "Primary Account Number (PAN) is secured wherever it is stored."
    category: "Account Data Protection"
    rule_ids:
      - "dlp_credit_card_in_log"
      - "dlp_ssn_in_log"
      - "file_windows_sam_system_access"
      - "file_shadow_or_passwd_access"

  - id: "PCI-4.2"
    name: "PAN Transmission Security"
    description: "PAN is protected with strong cryptography during transmission."
    category: "Data in Transit"
    rule_ids:
      - "network_tls_sni_suspicious"
      - "exfil_dns_tunneling"
      - "sigma_net_dns_over_https"
      - "exfil_large_outbound_transfer"
      - "network_large_egress_threshold"

  - id: "PCI-5.2"
    name: "Anti-Malware Mechanisms"
    description: "All system components are protected from malware."
    category: "Malware Protection"
    rule_ids:
      - "windows_defender_malware"
      - "defense_disable_defender"
      - "ransomware_mass_modifications_low"
      - "ransomware_known_extensions"
      - "mass_file_encryption"
      - "sigma_win_proc_hollowing"
      - "tags_malware_indicator"

  - id: "PCI-6.4"
    name: "Public-Facing Web Applications"
    description: "Public-facing web applications are protected against attacks."
    category: "Vulnerability Management"
    rule_ids:
      - "trap_shell_injection_probe"
      - "trap_admin_panel_probe"
      - "trap_api_exposure_probe"
      - "trap_scanner_detected"
      - "trap_repeat_offender"

  - id: "PCI-7.2"
    name: "Access Control to System Components"
    description: "Access to system components and cardholder data is appropriately defined and assigned."
    category: "Logical Access"
    rule_ids:
      - "warn_sudo_abuse"
      - "privilege_escalation"
      - "crit_root_login"
      - "win_special_privileges_4672"
      - "linux_sudo_auth_failure"
      - "win_group_member_added_4728_4732_4756"
      - "windows_admin_group_member_added"

  - id: "PCI-8.2"
    name: "User Identification and Authentication"
    description: "All users are assigned a unique ID before allowing them to access system components."
    category: "Authentication"
    rule_ids:
      - "crit_ssh_brute_force"
      - "failed_login_threshold"
      - "win_failed_logon_4625"
      - "win_failed_logon_4625_bruteforce_threshold"
      - "win_failed_logon_4625_password_spray_threshold"
      - "linux_ssh_failed_password_threshold"
      - "win_account_lockout_4740"
      - "brute_force_linux_ssh_threshold"
      - "linux_ssh_bruteforce"

  - id: "PCI-8.6"
    name: "Application/System Accounts"
    description: "Use of application and system accounts and associated authentication factors is strictly managed."
    category: "Authentication"
    rule_ids:
      - "win_new_user_4720"
      - "win_user_created_4720"
      - "win_user_deleted_4726"
      - "linux_new_user_created"
      - "linux_useradd_userdel"
      - "new_user_created"

  - id: "PCI-10.2"
    name: "Audit Log Implementation"
    description: "Audit logs capture user activities to reconstruct events."
    category: "Logging and Monitoring"
    rule_ids:
      - "defense_evasion_clear_event_logs"
      - "win_audit_log_cleared_1102"
      - "defense_wevtutil_clr"
      - "win_sequence_audit_policy_then_log_cleared_4719_1102"
      - "win_audit_policy_change_4719"
      - "sigma_linux_history_deletion"

  - id: "PCI-10.4"
    name: "Audit Log Review"
    description: "Audit logs are reviewed to identify anomalies or suspicious activities."
    category: "Logging and Monitoring"
    rule_ids:
      - "ids_suricata_alert_high"
      - "seq_brute_force_then_login_success"
      - "seq_cred_dump_then_lateral"
      - "sigma_win_golden_ticket"
      - "sigma_win_pass_the_hash"
      - "sigma_win_dcsync"

  - id: "PCI-11.5"
    name: "Intrusion Detection/Prevention"
    description: "Intrusion-detection and/or intrusion-prevention techniques are used to detect and/or prevent intrusions."
    category: "Monitoring"
    rule_ids:
      - "ids_suricata_alert_high"
      - "recon_port_scan_detected"
      - "suspicious_network_scan"
      - "honeypot_cowrie_login_failed"
      - "honeypot_cowrie_session_connect"
      - "trap_tcp_port_hit"
      - "trap_scanner_detected"

  - id: "PCI-12.10"
    name: "Incident Response Plan"
    description: "Suspected and confirmed security incidents are responded to immediately."
    category: "Incident Response"
    rule_ids:
      - "lateral_movement_psexec_indicators"
      - "sigma_win_impacket_tools"
      - "seq_defender_disabled_then_malware"
      - "seq_firewall_disabled_then_exfil"
      - "exfil_archive_then_upload"
      - "exfil_cloud_storage_upload"
