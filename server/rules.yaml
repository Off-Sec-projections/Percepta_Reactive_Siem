# Percepta SIEM Detection Rules
# Each rule defines conditions that trigger alerts when matched against incoming events

rules:
  - id: failed_login_threshold
    name: Multiple Failed Login Attempts
    description: Detects potential brute-force attacks via repeated failed authentication
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.category
        operator: equals
        value: AUTH
      - field: event.outcome
        operator: equals
        value: FAILURE
      - field: event.action
        operator: contains
        value: logon
    threshold:
      count: 3
      window_seconds: 60
      group_by: [user.name, host.ip]
    actions:
      - type: alert
        message: "Detected {{count}} failed login attempts from {{user.name}} on {{host.ip}} in {{window_seconds}} seconds"

  - id: privilege_escalation
    name: Privilege Escalation Detected
    description: Detects attempts to elevate privileges (sudo, runas, etc)
    enabled: true
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: in
        values: [sudo, su, runas, doas]
      - field: event.outcome
        operator: equals
        value: SUCCESS
    actions:
      - type: alert
        message: "Privilege escalation via {{process.name}} by {{user.name}} on {{agent.hostname}}"

  - id: suspicious_powershell
    name: Suspicious PowerShell Execution
    description: Detects encoded or obfuscated PowerShell commands
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: powershell
      - field: process.command_line
        operator: regex
        value: '(-enc|-encodedcommand|-w hidden|-nop)'
    actions:
      - type: alert
        message: "Suspicious PowerShell command detected: {{process.command_line}}"

  - id: sensitive_file_access
    name: Access to Sensitive Files
    description: Monitors access to credential stores and sensitive system files
    enabled: true
    severity: medium
    category: file
    conditions:
      - field: event.category
        operator: equals
        value: FILE
      - field: file.path
        operator: regex
        value: '(shadow|passwd|SAM|SYSTEM|credentials|id_rsa|\.ssh)'
      - field: file.operation
        operator: in
        values: [READ, MODIFIED]
    actions:
      - type: alert
        message: "Sensitive file {{file.operation}} by {{user.name}}: {{file.path}}"

  - id: network_c2_port
    name: Connection to Known C2 Ports
    description: Detects outbound connections to common command-and-control ports
    enabled: true
    severity: high
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: OUTBOUND
      - field: network.dst_port
        operator: in
        values: [4444, 5555, 6666, 7777, 8888, 9999]
    actions:
      - type: alert
        message: "Suspicious outbound connection from {{agent.hostname}} to {{network.dst_ip}}:{{network.dst_port}}"

  - id: new_user_created
    name: New User Account Created
    description: Alert when a new user account is created on the system
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.category
        operator: equals
        value: AUTH
      - field: event.action
        operator: contains
        value: user_add
    actions:
      - type: alert
        message: "New user account created: {{user.name}} by {{metadata.creator}}"

  - id: registry_persistence
    name: Registry Run Key Modification
    description: Detects modifications to registry autorun keys (Windows persistence)
    enabled: true
    severity: high
    category: registry
    conditions:
      - field: event.category
        operator: equals
        value: REGISTRY
      - field: registry.path
        operator: regex
        value: '(Run|RunOnce|RunServices)'
    actions:
      - type: alert
        message: "Registry persistence key modified: {{registry.path}} = {{registry.value}}"

  - id: mass_file_encryption
    name: Potential Ransomware Activity
    description: Detects rapid file modifications that may indicate ransomware
    enabled: true
    severity: critical
    category: file
    conditions:
      - field: event.category
        operator: equals
        value: FILE
      - field: file.operation
        operator: equals
        value: MODIFIED
    threshold:
      count: 50
      window_seconds: 60
      group_by: [agent.id]
    actions:
      - type: alert
        message: "Potential ransomware: {{count}} file modifications in {{window_seconds}}s on {{agent.hostname}}"

  - id: unauthorized_service_install
    name: Service Installation
    description: Alert when new system services are installed
    enabled: true
    severity: medium
    category: system
    conditions:
      - field: event.category
        operator: equals
        value: SYSTEM
      - field: event.action
        operator: contains
        value: service_install
    actions:
      - type: alert
        message: "New service installed on {{agent.hostname}}: {{metadata.service_name}}"

  - id: suspicious_network_scan
    name: Port Scanning Activity
    description: Detects rapid connections to multiple ports (potential reconnaissance)
    enabled: true
    severity: medium
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: OUTBOUND
    threshold:
      count: 20
      window_seconds: 30
      group_by: [agent.id, network.src_ip]
    actions:
      - type: alert
        message: "Port scan detected from {{network.src_ip}}: {{count}} connections in {{window_seconds}}s"

  # =============================
  # Authentication (Windows/Linux)
  # =============================

  - id: win_failed_logon_4625
    name: Windows Failed Logon (4625)
    description: Detect failed logon events by Windows event_id (Security-Auditing)
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4625"
    actions:
      - type: alert
        message: "Windows failed logon detected for {{user.name}} on {{agent.hostname}} ({{host.ip}})"

  - id: win_success_logon_4624_admin
    name: Windows Successful Logon With Elevated Privileges (4624 + 4672 pattern)
    description: Heuristic for privileged logons when event.summary/provider indicates special privileges
    enabled: false
    severity: high
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4672"
    actions:
      - type: alert
        message: "Special privileges assigned to new logon: {{user.name}} on {{agent.hostname}}"

  - id: win_new_user_4720
    name: Windows New User Created (4720)
    description: Detect creation of new user accounts (high impact administrative change)
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4720"
    actions:
      - type: alert
        message: "New local/domain user created: {{user.name}} on {{agent.hostname}}"

  - id: win_user_enabled_4722
    name: Windows Account Enabled (4722)
    description: Detect account being enabled
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4722"
    actions:
      - type: alert
        message: "Account enabled: {{user.name}} on {{agent.hostname}}"

  - id: win_user_disabled_4725
    name: Windows Account Disabled (4725)
    description: Detect account being disabled (could be attacker activity)
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4725"
    actions:
      - type: alert
        message: "Account disabled: {{user.name}} on {{agent.hostname}}"

  - id: win_password_reset_4724
    name: Windows Password Reset Attempt (4724)
    description: Detect password reset attempts (often used for takeover)
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4724"
    actions:
      - type: alert
        message: "Password reset attempt involving {{user.name}} on {{agent.hostname}}"

  - id: win_password_change_4723
    name: Windows Password Change Attempt (4723)
    description: Detect password change attempts
    enabled: false
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: equals
        value: "4723"
    actions:
      - type: alert
        message: "Password change attempt involving {{user.name}} on {{agent.hostname}}"

  - id: win_group_member_added_4728_4732_4756
    name: Windows Group Membership Change (4728/4732/4756)
    description: Detect user added to security-enabled group (possible privilege escalation)
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: Security-Auditing
      - field: event.event_id
        operator: in
        values: ["4728", "4732", "4756"]
    actions:
      - type: alert
        message: "Group membership changed for {{user.name}} on {{agent.hostname}}"

  - id: linux_sshd_failed_password
    name: Linux SSH Failed Password
    description: Detect SSH failed password attempts from raw log text
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: sshd
      - field: event.original_message
        operator: regex
        value: '(?i)Failed password|Invalid user'
    actions:
      - type: alert
        message: "SSH authentication failure for {{user.name}} on {{agent.hostname}} from {{host.ip}}"

  - id: linux_sudo_auth_failure
    name: Linux Sudo Authentication Failure
    description: Detect sudo failures (wrong password / not in sudoers)
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: sudo
      - field: event.original_message
        operator: regex
        value: '(?i)authentication failure|incorrect password|not in the sudoers file'
    actions:
      - type: alert
        message: "Sudo authentication failure for {{user.name}} on {{agent.hostname}}"

  - id: brute_force_linux_ssh_threshold
    name: Brute Force SSH (Threshold)
    description: Multiple SSH failures in short window
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.provider
        operator: contains
        value: sshd
      - field: event.original_message
        operator: regex
        value: '(?i)Failed password|Invalid user'
    threshold:
      count: 5
      window_seconds: 60
      group_by: [host.ip, user.name]
    actions:
      - type: alert
        message: "Detected {{count}} SSH failures for {{user.name}} from {{host.ip}} in {{window_seconds}} seconds"

  # =============================
  # Process / LOLBins / Execution
  # =============================

  - id: process_cmd_powershell_encoded
    name: PowerShell Encoded Command
    description: Detect PowerShell encoded command flags (-enc/-EncodedCommand)
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: powershell
      - field: process.command_line
        operator: regex
        value: '(?i)(-enc\s|-encodedcommand\s)'
    actions:
      - type: alert
        message: "PowerShell encoded command: {{process.command_line}}"

  - id: process_cmd_powershell_hidden
    name: PowerShell Hidden Window
    description: Detect PowerShell with hidden window and no profile
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: powershell
      - field: process.command_line
        operator: regex
        value: '(?i)(-w\s+hidden|-windowstyle\s+hidden).*?(-nop|-noprofile)'
    actions:
      - type: alert
        message: "Suspicious PowerShell flags: {{process.command_line}}"

  - id: process_cmd_powershell_downloadstring
    name: PowerShell DownloadString / IEX
    description: Detect common PowerShell download + execute patterns
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: powershell
      - field: process.command_line
        operator: regex
        value: '(?i)(DownloadString\(|Invoke-WebRequest|iwr\s|New-Object\s+Net\.WebClient|IEX\s|Invoke-Expression)'
    actions:
      - type: alert
        message: "PowerShell download/exec pattern: {{process.command_line}}"

  - id: process_cmd_powershell_amsi_bypass
    name: PowerShell AMSI Bypass Indicators
    description: Detect common AMSI bypass strings (heuristic)
    enabled: false
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: powershell
      - field: process.command_line
        operator: regex
        value: '(?i)AmsiUtils|amsi\.dll|Bypass\s+AMSI|amsiInitFailed'
    actions:
      - type: alert
        message: "Potential AMSI bypass attempt: {{process.command_line}}"

  - id: lolbin_certutil_urlcache
    name: LOLBin Certutil Download
    description: Detect certutil usage to download a payload
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: certutil
      - field: process.command_line
        operator: regex
        value: '(?i)(-urlcache\s+-split\s+-f\s+https?://|\shttps?://)'
    actions:
      - type: alert
        message: "Certutil download pattern: {{process.command_line}}"

  - id: lolbin_certutil_decode
    name: LOLBin Certutil Decode
    description: Detect certutil decode (often used to unpack malware)
    enabled: true
    severity: medium
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: certutil
      - field: process.command_line
        operator: regex
        value: '(?i)(-decode\s|-decodehex\s)'
    actions:
      - type: alert
        message: "Certutil decode pattern: {{process.command_line}}"

  - id: lolbin_bitsadmin_transfer
    name: LOLBin Bitsadmin Transfer
    description: Detect bitsadmin used for file transfer
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: bitsadmin
      - field: process.command_line
        operator: regex
        value: '(?i)(/transfer\s|/addfile\s|http://|https://)'
    actions:
      - type: alert
        message: "Bitsadmin transfer pattern: {{process.command_line}}"

  - id: lolbin_mshta_remote
    name: LOLBin MSHTA Remote Execution
    description: Detect mshta fetching remote content
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: mshta
      - field: process.command_line
        operator: regex
        value: '(?i)https?://|javascript:|vbscript:'
    actions:
      - type: alert
        message: "MSHTA remote/scripting pattern: {{process.command_line}}"

  - id: lolbin_rundll32_script
    name: LOLBin Rundll32 Script/URL
    description: Detect rundll32 used with script engines or URLs
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: rundll32
      - field: process.command_line
        operator: regex
        value: '(?i)javascript:|http://|https://|shell32\.dll,ShellExec_RunDLL'
    actions:
      - type: alert
        message: "Rundll32 suspicious invocation: {{process.command_line}}"

  - id: lolbin_regsvr32_sct
    name: LOLBin Regsvr32 SCT Execution
    description: Detect regsvr32 executing scriptlet (.sct)
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: regsvr32
      - field: process.command_line
        operator: regex
        value: '(?i)(scrobj\.dll|\.sct\b|/i:.*https?://)'
    actions:
      - type: alert
        message: "Regsvr32 scriptlet pattern: {{process.command_line}}"

  - id: lolbin_wmic_process_create
    name: LOLBin WMIC Process Creation
    description: Detect WMIC used to spawn processes (often lateral/remote admin)
    enabled: true
    severity: medium
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: wmic
      - field: process.command_line
        operator: regex
        value: '(?i)process\s+call\s+create|/node:|\\\\'
    actions:
      - type: alert
        message: "WMIC suspicious usage: {{process.command_line}}"

  - id: lolbin_schtasks_create
    name: Scheduled Task Creation (schtasks)
    description: Detect task creation commands
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: schtasks
      - field: process.command_line
        operator: regex
        value: '(?i)/create\b|/change\b'
    actions:
      - type: alert
        message: "Scheduled task change: {{process.command_line}}"

  - id: lolbin_sc_service_create
    name: Service Creation (sc.exe)
    description: Detect service creation/config changes via sc.exe
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: sc
      - field: process.command_line
        operator: regex
        value: '(?i)\screate\s|\sconfig\s'
    actions:
      - type: alert
        message: "Service create/config command: {{process.command_line}}"

  - id: defense_evasion_clear_event_logs
    name: Event Log Clearing
    description: Detect attempts to clear Windows event logs
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: in
        values: ["wevtutil", "powershell", "cmd"]
      - field: process.command_line
        operator: regex
        value: '(?i)wevtutil\s+cl\s|Clear-EventLog\b|Remove-EventLog\b'
    actions:
      - type: alert
        message: "Event log clearing attempt: {{process.command_line}}"

  - id: defense_evasion_disable_defender
    name: Disable Windows Defender Indicators
    description: Detect commands that disable Defender / realtime monitoring
    enabled: true
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)Set-MpPreference\s+-DisableRealtimeMonitoring\s+\$?true|DisableRealtimeMonitoring|Add-MpPreference\s+-ExclusionPath|Add-MpPreference\s+-ExclusionProcess'
    actions:
      - type: alert
        message: "Defender tampering command: {{process.command_line}}"

  - id: defense_evasion_vssadmin_delete
    name: Delete Shadow Copies (vssadmin)
    description: Detect shadow copy deletion (ransomware precursor)
    enabled: true
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: vssadmin
      - field: process.command_line
        operator: regex
        value: '(?i)delete\s+shadows\b|resize\s+shadowstorage\b'
    actions:
      - type: alert
        message: "Shadow copy deletion command: {{process.command_line}}"

  - id: defense_evasion_bcdedit_recovery_disable
    name: Disable Recovery via BCDEdit
    description: Detect attempts to disable recovery / safeboot (ransomware behavior)
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: bcdedit
      - field: process.command_line
        operator: regex
        value: '(?i)recoveryenabled\s+no|bootstatuspolicy\s+ignoreallfailures'
    actions:
      - type: alert
        message: "BCDEdit recovery tampering: {{process.command_line}}"

  - id: linux_reverse_shell_patterns
    name: Linux Reverse Shell Pattern
    description: Detect common reverse shell command patterns
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)(/dev/tcp/|bash\s+-i\b|nc\s+-e\b|ncat\s+-e\b|socat\s+TCP|python\s+-c\b.*socket)'
    actions:
      - type: alert
        message: "Reverse shell pattern: {{process.command_line}}"

  - id: linux_curl_pipe_sh
    name: Curl/Wget Piped to Shell
    description: Detect remote script execution via curl/wget piped to sh/bash
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)(curl\s+[^|]+\|\s*(sh|bash)\b|wget\s+[^|]+\|\s*(sh|bash)\b)'
    actions:
      - type: alert
        message: "Remote script execution pattern: {{process.command_line}}"

  - id: linux_chmod_tmp_exec
    name: Executable Created in /tmp
    description: Detect chmod making files executable in /tmp or /var/tmp
    enabled: true
    severity: medium
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)chmod\s+\+x\s+(/tmp/|/var/tmp/)'
    actions:
      - type: alert
        message: "Executable permission set in temp dir: {{process.command_line}}"

  - id: credential_dumping_mimikatz_keywords
    name: Credential Dumping Keywords
    description: Detect well-known credential dumping keywords in command lines
    enabled: true
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)mimikatz|sekurlsa::logonpasswords|lsadump::sam|procdump\s+.*lsass|comsvcs\.dll,\s*MiniDump'
    actions:
      - type: alert
        message: "Credential dumping indicator: {{process.command_line}}"

  - id: discovery_net_user_group
    name: Discovery via net user / net group
    description: Detect account/group discovery commands
    enabled: false
    severity: medium
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)\bnet\s+user\b|\bnet\s+group\b|\bnet\s+localgroup\b'
    actions:
      - type: alert
        message: "Account/group discovery: {{process.command_line}}"

  - id: discovery_whoami_ipconfig_systeminfo
    name: Discovery via whoami/ipconfig/systeminfo
    description: Detect basic host discovery commands (noisy)
    enabled: false
    severity: low
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: in
        values: ["whoami", "ipconfig", "systeminfo", "hostname"]
    actions:
      - type: alert
        message: "Host discovery command executed: {{process.name}} on {{agent.hostname}}"

  - id: lateral_movement_psexec_indicators
    name: PsExec/Service-based Lateral Movement Indicators
    description: Detect common PsExec strings or service-based remote execution artifacts
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)\\\\.*\\ADMIN\$|\\\\.*\\C\$|psexec(\.exe)?\b|\\\\.*\\IPC\$'
    actions:
      - type: alert
        message: "Potential lateral movement artifact: {{process.command_line}}"

  # =============================
  # Registry Persistence (Windows)
  # =============================

  - id: registry_runkeys_modified
    name: Registry Run Key Modified
    description: Detect modifications to Run/RunOnce keys
    enabled: true
    severity: high
    category: registry
    conditions:
      - field: event.category
        operator: equals
        value: REGISTRY
      - field: registry.path
        operator: regex
