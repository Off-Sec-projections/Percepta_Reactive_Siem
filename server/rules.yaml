  # =====================================
  # Bulk LOLBin/Tooling Coverage (Enabled)
  # =====================================

  - id: tool_nltest_domain_discovery
    name: Domain Discovery via nltest
    description: Detect nltest discovery commands
    enabled: false
    severity: low
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: nltest
    actions:
      - type: alert
        message: "nltest executed on {{agent.hostname}} by {{user.name}}"

  - id: tool_netsh_firewall_changes
    name: Firewall Changes via netsh
    description: Detect netsh firewall rule changes
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: netsh
      - field: process.command_line
        operator: regex
        value: '(?i)advfirewall\s+set\s+allprofiles\s+state\s+off|firewall\s+set\s+opmode\s+disable|add\s+rule'
    actions:
      - type: alert
        message: "Firewall tampering: {{process.command_line}}"

  - id: tool_reg_add_runkey
    name: Registry Autorun via reg.exe
    description: Detect reg.exe adding autorun keys
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: reg
      - field: process.command_line
        operator: regex
        value: '(?i)\\badd\\b.*\\\
              \\CurrentVersion\\\\Run(Once)?\\\
              '
    actions:
      - type: alert
        message: "reg.exe autorun modification: {{process.command_line}}"

