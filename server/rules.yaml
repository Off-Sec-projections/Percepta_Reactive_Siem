  # =============================
  # File System (Credentials / Persistence / Ransomware)
  # =============================

  - id: file_authorized_keys_modified
    name: SSH authorized_keys Modified
    description: Detect modification of SSH authorized_keys (persistence)
    enabled: true
    severity: high
    category: file
    conditions:
      - field: event.category
        operator: equals
        value: FILE
      - field: file.path
        operator: regex
        value: '(?i)\\.ssh/authorized_keys$|/root/\\.ssh/authorized_keys$'
      - field: file.operation
        operator: in
        values: ["CREATED", "MODIFIED"]
    actions:
      - type: alert
        message: "authorized_keys modified by {{user.name}} on {{agent.hostname}}: {{file.path}}"

  - id: file_crontab_modified
    name: Cron Persistence File Modified
    description: Detect modifications to cron config
    enabled: true
