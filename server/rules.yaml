        operator: regex
        value: '(?i)/etc/crontab$|/etc/cron\\.(d|daily|hourly|weekly|monthly)/|/var/spool/cron/'
      - field: file.operation
        operator: in
        values: ["CREATED", "MODIFIED"]
    actions:
      - type: alert
        message: "Cron persistence file modified on {{agent.hostname}}: {{file.path}}"

  - id: file_sudoers_modified
