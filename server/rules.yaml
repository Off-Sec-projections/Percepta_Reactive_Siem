        value: '(?i)\\CurrentVersion\\Run(Once)?'
    actions:
      - type: alert
        message: "Registry autorun modified on {{agent.hostname}}: {{registry.path}}"

  - id: persistence_schtasks_cmd
    name: schtasks Create
    description: schtasks creation from command line
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: schtasks
      - field: process.command_line
        operator: regex
        value: '(?i)\b/create\b'
    actions:
      - type: alert
        message: "schtasks created on {{agent.hostname}}: {{process.command_line}}"

  - id: persistence_sc_create_service
    name: sc.exe Create Service
    description: Create a new Windows service via sc.exe
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: regex
        value: '(?i)\\sc(\\.exe)?$'
      - field: process.command_line
        operator: regex
        value: '(?i)\bcreate\b'
    actions:
      - type: alert
        message: "Service creation via sc.exe on {{agent.hostname}}: {{process.command_line}}"

  - id: file_write_executable_temp
    name: Executable Written to Temp
    description: Dropping executables into temp directories
    enabled: true
    severity: high
    category: file
    conditions:
      - field: event.category
        operator: equals
        value: FILE
      - field: file.path
        operator: regex
        value: '(?i)(\\\\Temp\\\\|\\\\AppData\\\\Local\\\\Temp\\\\|/tmp/|/var/tmp/).*(\\.exe|\\.dll|\\.ps1|\\.sh|\\.bin)$'
      - field: file.operation
        operator: in
        values: [CREATED, WRITE, MODIFIED]
    actions:
      - type: alert
        message: "Executable written to temp on {{agent.hostname}}: {{file.path}}"

  - id: net_outbound_suspicious_ports
    name: Outbound to Suspicious High-Risk Ports
    description: Common attacker tooling/C2 ports
    enabled: false
    severity: medium
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: OUTBOUND
      - field: network.dst_port
        operator: in
        values: [22, 23, 3389, 445, 5985, 5986]
    actions:
      - type: alert
        message: "Outbound connection to sensitive port {{network.dst_port}} from {{agent.hostname}} to {{network.dst_ip}}"

  - id: net_inbound_rdp
    name: Inbound RDP Connection
    description: Track inbound RDP connections
    enabled: false
    severity: low
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: INBOUND
      - field: network.dst_port
        operator: equals
        value: 3389
    actions:
      - type: alert
        message: "Inbound RDP to {{agent.hostname}} from {{network.src_ip}}"

  - id: linux_ssh_failed_password_threshold
    name: Linux SSH Failed Password Spike
    description: Detect brute-force SSH attempts (log-based)
    enabled: true
    severity: high
    category: authentication
    conditions:
      - field: event.category
        operator: equals
        value: AUTH
      - field: event.original_message
        operator: regex
        value: '(?i)sshd.*failed password'
    threshold:
      count: 6
      window_seconds: 90
      group_by: [host.ip, user.name]
    actions:
      - type: alert
        message: "SSH failed password spike: {{count}} in {{window_seconds}}s user={{user.name}} ip={{host.ip}}"

  - id: linux_sudo_auth_fail_threshold
    name: Linux sudo Authentication Failures
    description: Detect repeated sudo auth failures
    enabled: true
    severity: medium
    category: authentication
    conditions:
      - field: event.category
        operator: equals
        value: AUTH
      - field: event.original_message
        operator: regex
        value: '(?i)sudo:.*authentication failure'
    threshold:
      count: 3
      window_seconds: 60
      group_by: [user.name, host.ip]
    actions:
      - type: alert
        message: "sudo auth failures: {{count}} in {{window_seconds}}s user={{user.name}} ip={{host.ip}}"

  - id: linux_useradd_userdel
    name: Linux useradd/userdel Detected
    description: Detect local user management commands
    enabled: false
    severity: medium
    category: authentication
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: in
        values: [useradd, userdel, adduser, deluser]
    actions:
      - type: alert
        message: "Linux user management: {{process.name}} by {{user.name}} on {{agent.hostname}}"

  - id: process_mimikatz_indicators
    name: Mimikatz Indicators
    description: Common mimikatz strings in command line
    enabled: true
    severity: critical
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)mimikatz|sekurlsa::logonpasswords|lsadump::sam'
    actions:
      - type: alert
        message: "Possible mimikatz activity on {{agent.hostname}}: {{process.command_line}}"

  - id: process_psexec_like
    name: PsExec-like Remote Execution
    description: Detect common PsExec patterns
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.command_line
        operator: regex
        value: '(?i)psexec(\\.exe)?\b|\\\\\\\\.*\\\\ADMIN\$'
    actions:
      - type: alert
        message: "Possible remote exec (PsExec-like) on {{agent.hostname}}: {{process.command_line}}"

  - id: process_wmic_remote
    name: WMIC Remote Execution
    description: wmic process call create / remote usage
    enabled: true
    severity: high
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: contains
        value: wmic
      - field: process.command_line
        operator: regex
        value: '(?i)process\s+call\s+create|/node:'
    actions:
      - type: alert
        message: "WMIC remote/process create on {{agent.hostname}}: {{process.command_line}}"

  - id: process_lolbin_curl_wget_download
    name: curl/wget Download
    description: Command-line download from URL
    enabled: false
    severity: low
    category: process
    conditions:
      - field: event.category
        operator: equals
        value: PROCESS
      - field: process.name
        operator: in
        values: [curl, wget]
      - field: process.command_line
        operator: regex
        value: '(?i)\bhttp(s)?://'
    actions:
      - type: alert
        message: "Download via {{process.name}} on {{agent.hostname}}: {{process.command_line}}"
