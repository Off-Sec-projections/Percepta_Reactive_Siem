    conditions:
      - field: event.category
        operator: equals
        value: FILE
      - field: file.path
        operator: regex
        value: '(?i)\\.(locked|encrypt|encrypted|crypt|cry|enc|aes|onion|pay|readme)$'
      - field: file.operation
        operator: in
        values: ["CREATED", "MODIFIED"]
    actions:
      - type: alert
        message: "Possible ransomware extension activity on {{agent.hostname}}: {{file.path}}"

  # =============================
  # Network (C2 / Exfil / Suspicious Destinations)
  # =============================

  - id: network_suspicious_ports_extended
    name: Outbound to Suspicious Ports (Extended)
    description: Detect outbound connections to common C2/remote admin ports
    enabled: true
    severity: medium
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: OUTBOUND
      - field: network.dst_port
        operator: in
        values: ["22", "23", "3389", "4444", "5555", "5900", "5985", "5986", "8080", "8443", "9001", "9050"]
    actions:
      - type: alert
        message: "Outbound connection to suspicious port: {{network.dst_ip}}:{{network.dst_port}} from {{agent.hostname}}"

  - id: network_large_egress_threshold
    name: Large Outbound Data Volume (Threshold)
    description: Detect large outbound bytes over short window (exfil heuristic)
    enabled: false
    severity: high
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.direction
        operator: equals
        value: OUTBOUND
    threshold:
      count: 20
      window_seconds: 60
      group_by: [agent.id]
    actions:
      - type: alert
        message: "Sustained outbound traffic from {{agent.hostname}} to {{network.dst_ip}}"

  - id: network_tls_sni_suspicious
    name: Suspicious TLS SNI (Heuristic)
    description: Detect suspicious TLS SNI patterns (dynamic DNS / paste sites / short domains)
    enabled: false
    severity: medium
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.tls_sni
        operator: regex
        value: '(?i)(duckdns\\.org|no-ip\\.com|ddns\\.|pastebin\\.com|raw\\.githubusercontent\\.com|ngrok\\.io)$'
    actions:
      - type: alert
        message: "Suspicious TLS SNI observed from {{agent.hostname}}: {{network.dst_ip}}:{{network.dst_port}}"

  - id: network_ja3_known_suspicious
    name: Suspicious JA3 Fingerprint (Heuristic)
    description: Match known suspicious JA3/JA3S values (populate values as intel becomes available)
    enabled: false
    severity: high
    category: network
    conditions:
      - field: event.category
        operator: equals
        value: NETWORK
      - field: network.ja3
        operator: in
        values: ["" ]
    actions:
      - type: alert
        message: "Suspicious JA3 observed from {{agent.hostname}} to {{network.dst_ip}}"

  # =============================
  # Tags-driven (generic)
  # =============================

  - id: tags_malware_indicator
    name: Malware Tag Indicator
    description: Trigger when upstream tags indicate malware (requires agent/parser tagging)
    enabled: false
    severity: critical
