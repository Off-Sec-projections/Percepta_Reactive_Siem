name: "seq_4720_then_4722"
expect:
  rule_should_match: "win_sequence_new_user_then_enabled_4720_4722"
  trigger_on_index: 1
events:
  - name: "e0_4720_user_created"
    event_id: 4720
    provider: "Microsoft-Windows-Security-Auditing"
    agent_id: "golden-agent-1"
    agent_hostname: "WIN-DC01"
    metadata:
      winlog.event_data.TargetUserName: "newuser"
      winlog.event_data.TargetDomainName: "CONTOSO"
      winlog.event_data.TargetSid: "S-1-5-21-1111111111-2222222222-3333333333-1109"
      winlog.event_data.SubjectUserName: "admin"
    expect:
      category: "AUTH"
      action: "user_add"
      outcome: "SUCCESS"
      user_name: "newuser"
      user_domain: "CONTOSO"
      user_id: "S-1-5-21-1111111111-2222222222-3333333333-1109"
      metadata_equals:
        metadata.creator: "admin"

  - name: "e1_4722_user_enabled"
    event_id: 4722
    provider: "Microsoft-Windows-Security-Auditing"
    agent_id: "golden-agent-1"
    agent_hostname: "WIN-DC01"
    metadata:
      winlog.event_data.TargetUserName: "newuser"
      winlog.event_data.TargetDomainName: "CONTOSO"
      winlog.event_data.TargetSid: "S-1-5-21-1111111111-2222222222-3333333333-1109"
      winlog.event_data.SubjectUserName: "admin"
    expect:
      category: "AUTH"
      action: "user_enable"
      outcome: "SUCCESS"
      user_name: "newuser"
      user_domain: "CONTOSO"
      user_id: "S-1-5-21-1111111111-2222222222-3333333333-1109"
      metadata_equals:
        metadata.actor: "admin"
