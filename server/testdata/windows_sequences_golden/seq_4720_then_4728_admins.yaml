name: "seq_4720_then_4728_admins"
expect:
  rule_should_match: "win_sequence_new_user_then_priv_group_4720_4728_4732"
  trigger_on_index: 1
events:
  - name: "e0_4720_user_created"
    event_id: 4720
    provider: "Microsoft-Windows-Security-Auditing"
    agent_id: "golden-agent-3"
    agent_hostname: "WIN-DC03"
    metadata:
      winlog.event_data.TargetUserName: "newuser2"
      winlog.event_data.TargetDomainName: "CONTOSO"
      winlog.event_data.TargetSid: "S-1-5-21-1111111111-2222222222-3333333333-1110"
      winlog.event_data.SubjectUserName: "admin"
    expect:
      category: "AUTH"
      action: "user_add"
      outcome: "SUCCESS"
      user_name: "newuser2"
      user_domain: "CONTOSO"
      user_id: "S-1-5-21-1111111111-2222222222-3333333333-1110"

  - name: "e1_4728_member_added_admins"
    event_id: 4728
    provider: "Microsoft-Windows-Security-Auditing"
    agent_id: "golden-agent-3"
    agent_hostname: "WIN-DC03"
    metadata:
      winlog.event_data.SubjectUserName: "admin"
      winlog.event_data.SubjectDomainName: "CONTOSO"
      winlog.event_data.SubjectUserSid: "S-1-5-21-1111111111-2222222222-3333333333-500"
      winlog.event_data.MemberName: "CONTOSO\\newuser2"
      winlog.event_data.TargetUserName: "Administrators"
    expect:
      category: "AUTH"
      action: "group_member_add"
      outcome: "SUCCESS"
      user_name: "admin"
      user_domain: "CONTOSO"
      user_id: "S-1-5-21-1111111111-2222222222-3333333333-500"
      metadata_equals:
        metadata.group: "Administrators"
        metadata.member: "CONTOSO\\newuser2"
